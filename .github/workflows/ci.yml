# cairn CI — build the self-verifying container, then smoke the demo.
#
# The Containerfile mints the fixtures, proves the claim spans resolve (cairn
# ground), and runs the pytest suite AT BUILD TIME, so a green `docker build` *is*
# the test pass. No registry push, no secrets:
# the scoring engine stays plain git + one container by design: the scoring must
# run on a fresh machine.
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Serialize per ref; never cancel a main run, cancel superseded branch runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: build + self-verify (mints all 3 corpora + cairn ground + runs the pytest suite at build time)
        run: |
          set -euo pipefail
          docker build -t cairn:ci -f Containerfile .

      - name: HSM-trio demo smoke (REFUSE-TO-COMBINE / n_eff=1 vs naive 125:1)
        run: docker run --rm cairn:ci

      - name: three worked examples smoke (covid / eggs / cern all REFUSE-TO-COMBINE)
        run: docker run --rm cairn:ci python demo/worked_examples.py

      - name: cleanup (shared-filesystem hygiene)
        if: always()
        run: docker image rm cairn:ci 2>/dev/null || true
